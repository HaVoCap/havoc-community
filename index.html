<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Havoc Community</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://unpkg.com"></script>
    <style>
        /* Styl dla paska przewijania (scrollbar) */
        #chat-window::-webkit-scrollbar {
            width: 8px;
        }
        #chat-window::-webkit-scrollbar-track {
            background: #1f2937;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        #chat-window::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* KLUCZOWA POPRAWKA: Stała wysokość i przewijanie */
        #chat-window {
            height: calc(100vh - 180px); /* Dopasowuje wysokość do ekranu */
            overflow-y: auto;           /* Włącza przewijanie */
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            scroll-behavior: smooth;    /* Płynne przewijanie */
        }

        .message {
            background: #374151;
            padding: 10px;
            border-radius: 8px;
            max-width: fit-content;
        }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-800 p-4 flex flex-col border-r border-gray-700">
            <h1 class="text-xl font-bold mb-4">HAVOC COMMUNITY</h1>
            <div id="channel-list" class="flex-1 overflow-y-auto space-y-2">
                <!-- Kanały pojawią się tutaj -->
            </div>
            <button onclick="document.getElementById('channelModal').classList.toggle('hidden')" class="mt-4 bg-blue-600 p-2 rounded hover:bg-blue-700">
                + Dodaj kanał
            </button>
        </div>

        <!-- Main Chat Area -->
        <div class="flex-1 flex flex-col">
            <header class="p-4 border-b border-gray-700 bg-gray-800">
                <h2 id="current-channel-name" class="text-lg font-semibold">Wybierz kanał</h2>
            </header>

            <!-- OKNO CZATU -->
            <div id="chat-window">
                <div class="text-gray-500">Wybierz kanał z listy po lewej, aby zacząć rozmawiać.</div>
            </div>

            <!-- INPUT AREA -->
            <div class="p-4 bg-gray-800 border-t border-gray-700">
                <div class="flex gap-2">
                    <input type="text" id="message-input" placeholder="Napisz wiadomość..." class="flex-1 bg-gray-700 p-2 rounded outline-none focus:ring-2 focus:ring-blue-500">
                    <button id="send-button" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">Wyślij</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal dodawania kanału -->
    <div id="channelModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-gray-800 p-6 rounded-lg w-96">
            <h2 class="text-lg mb-4">Nowy kanał</h2>
            <input type="text" id="newChannelName" class="w-full bg-gray-700 p-2 rounded mb-4" placeholder="Nazwa kanału">
            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('channelModal').classList.add('hidden')" class="p-2">Anuluj</button>
                <button id="create-channel-btn" class="bg-blue-600 p-2 rounded">Stwórz</button>
            </div>
        </div>
    </div>

    <script type="module">
        // KONFIGURACJA SUPABASE (Wklej tutaj swoje dane)
        const supabaseUrl = '***TWOJE_URL***';
        const supabaseKey = '***TWÓJ_KLUCZ***';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentChannelId = null;
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('message-input');

        // FUNKCJA PRZEWIJANIA NA DÓŁ
        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Pobieranie kanałów
        async function loadChannels() {
            const { data: channels } = await supabase.from('channels').select('*');
            const list = document.getElementById('channel-list');
            list.innerHTML = '';
            channels.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-2 hover:bg-gray-700 rounded transition";
                btn.textContent = "# " + ch.name;
                btn.onclick = () => switchChannel(ch.id, ch.name);
                list.appendChild(btn);
            });
        }

        // Zmiana kanału
        async function switchChannel(id, name) {
            currentChannelId = id;
            document.getElementById('current-channel-name').textContent = "# " + name;
            loadMessages(id);
        }

        // Pobieranie wiadomości
        async function loadMessages(channelId) {
            const { data: messages } = await supabase
                .from('messages')
                .select('*')
                .eq('channel_id', channelId)
                .order('created_at', { ascending: true });

            chatWindow.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = "message";
                div.textContent = msg.text;
                chatWindow.appendChild(div);
            });
            scrollToBottom(); // Przewiń po załadowaniu
        }

        // Wysyłanie wiadomości
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentChannelId) return;

            const { error } = await supabase
                .from('messages')
                .insert();

            if (!error) {
                messageInput.value = '';
                loadMessages(currentChannelId); // Odśwież i przewiń
            }
        }

        // Nasłuchiwanie na przycisk i Enter
        document.getElementById('send-button').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        // Start aplikacji
        loadChannels();

        // Realtime (opcjonalnie - automatyczne przewijanie przy nowych wiadomościach)
        supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.channel_id === currentChannelId) {
                    loadMessages(currentChannelId);
                }
            })
            .subscribe();
    </script>
</body>
</html>
