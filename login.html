<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HaVoC Community | Logowanie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glow { box-shadow: 0 0 60px rgba(182, 160, 255, 0.3); }
        .input-glow:focus { box-shadow: 0 0 20px rgba(182, 160, 255, 0.4); }
    </style>
</head>
<body class="bg-[#0c0e11] min-h-screen flex items-center justify-center p-4">
    
    <!-- Container -->
    <div class="w-full max-w-md">
        
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-[#b6a0ff] to-[#7e51ff] rounded-2xl flex items-center justify-center glow">
                <span class="text-4xl">💀</span>
            </div>
            <h1 class="text-3xl font-black text-white">HaVoC</h1>
            <p class="text-[#aaabaf] mt-2">Twoja społeczność czeka</p>
        </div>

        <!-- Card -->
        <div class="bg-[#111417] rounded-2xl p-8 border border-[#23262a] glow">
            
            <!-- Tabs -->
            <div class="flex mb-8 bg-[#0c0e11] rounded-xl p-1">
                <button id="loginTab" onclick="showLogin()" class="flex-1 py-3 rounded-lg font-bold text-white bg-gradient-to-r from-[#b6a0ff] to-[#7e51ff] transition-all">
                    Logowanie
                </button>
                <button id="registerTab" onclick="showRegister()" class="flex-1 py-3 rounded-lg font-bold text-[#aaabaf] hover:text-white transition-all">
                    Rejestracja
                </button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-[#aaabaf] text-sm font-medium mb-2">Email</label>
                    <input type="email" id="loginEmail" required
                        class="w-full bg-[#0c0e11] border border-[#23262a] rounded-xl px-4 py-3 text-white placeholder-[#46484b] focus:border-[#b6a0ff] focus:outline-none input-glow transition-all"
                        placeholder="twoj@email.com">
                </div>
                <div>
                    <label class="block text-[#aaabaf] text-sm font-medium mb-2">Hasło</label>
                    <input type="password" id="loginPassword" required
                        class="w-full bg-[#0c0e11] border border-[#23262a] rounded-xl px-4 py-3 text-white placeholder-[#46484b] focus:border-[#b6a0ff] focus:outline-none input-glow transition-all"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-[#b6a0ff] to-[#7e51ff] rounded-xl font-bold text-white hover:opacity-90 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    Zaloguj się
                </button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" class="space-y-6 hidden">
                <div>
                    <label class="block text-[#aaabaf] text-sm font-medium mb-2">Nazwa użytkownika</label>
                    <input type="text" id="registerUsername" required
                        class="w-full bg-[#0c0e11] border border-[#23262a] rounded-xl px-4 py-3 text-white placeholder-[#46484b] focus:border-[#b6a0ff] focus:outline-none input-glow transition-all"
                        placeholder="TwojNick">
                </div>
                <div>
                    <label class="block text-[#aaabaf] text-sm font-medium mb-2">Email</label>
                    <input type="email" id="registerEmail" required
                        class="w-full bg-[#0c0e11] border border-[#23262a] rounded-xl px-4 py-3 text-white placeholder-[#46484b] focus:border-[#b6a0ff] focus:outline-none input-glow transition-all"
                        placeholder="twoj@email.com">
                </div>
                <div>
                    <label class="block text-[#aaabaf] text-sm font-medium mb-2">Hasło</label>
                    <input type="password" id="registerPassword" required minlength="6"
                        class="w-full bg-[#0c0e11] border border-[#23262a] rounded-xl px-4 py-3 text-white placeholder-[#46484b] focus:border-[#b6a0ff] focus:outline-none input-glow transition-all"
                        placeholder="Min. 6 znaków">
                </div>
                <button type="submit"
                    class="w-full py-4 bg-gradient-to-r from-[#b6a0ff] to-[#7e51ff] rounded-xl font-bold text-white hover:opacity-90 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    Stwórz konto
                </button>
            </form>

            <!-- Error/Success Message -->
            <div id="message" class="mt-6 text-center hidden">
                <p id="messageText" class="text-sm"></p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-[#46484b] text-sm mt-8">
            HaVoC Community © 2025
        </p>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase config
        const SUPABASE_URL = 'https://pykkeknmtalulktajcgb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5a2tla25tdGFsdWxrdGFqY2diIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NjI0NzIsImV4cCI6MjA5MTEzODQ3Mn0.q22LJBe6yZ2so0-0KXY_EBfsN68lzaxUDXpXo1prwUw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
        persistSession: true,
        storageKey: 'havoc-auth',
        storage: window.localStorage,
        autoRefreshToken: true,
        detectSessionInUrl: false
    }
});

// Sprawdź czy już zalogowany
async function checkUser() {
    console.log('=== LOGIN.HTML: SPRAWDZAM CZY ZALOGOWANY ===');
    
    // Sprawdź localStorage
    const storedAuth = localStorage.getItem('havoc-auth');
    console.log('localStorage havoc-auth:', storedAuth ? 'JEST' : 'BRAK');
    
    try {
        // Spróbuj odświeżyć sesję
        console.log('Próbuję odświeżyć sesję...');
        const { data: refreshData, error: refreshError } = await supabaseClient.auth.refreshSession();
        
        console.log('Refresh data:', refreshData);
        console.log('Refresh error:', refreshError);
        
        if (refreshData && refreshData.session) {
            console.log('Sesja odświeżona - przekierowuję do index.html');
            window.location.href = 'index.html';
            return;
        }
        
        // Sprawdź sesję
        console.log('Sprawdzam sesję...');
        const { data, error } = await supabaseClient.auth.getSession();
        
        console.log('Session data:', data);
        console.log('Session error:', error);
        
        if (data && data.session) {
            console.log('Jest sesja - przekierowuję do index.html');
            window.location.href = 'index.html';
            return;
        }
        
        console.log('BRAK SESJI - pokazuję formularz logowania');
        
    } catch (err) {
        console.error('Błąd sprawdzania:', err);
    }
}

// Uruchom sprawdzanie
checkUser();



        // Przełączanie tabów
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('bg-gradient-to-r', 'from-[#b6a0ff]', 'to-[#7e51ff]', 'text-white');
            document.getElementById('loginTab').classList.remove('text-[#aaabaf]');
            document.getElementById('registerTab').classList.remove('bg-gradient-to-r', 'from-[#b6a0ff]', 'to-[#7e51ff]', 'text-white');
            document.getElementById('registerTab').classList.add('text-[#aaabaf]');
        }

        function showRegister() {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerTab').classList.add('bg-gradient-to-r', 'from-[#b6a0ff]', 'to-[#7e51ff]', 'text-white');
            document.getElementById('registerTab').classList.remove('text-[#aaabaf]');
            document.getElementById('loginTab').classList.remove('bg-gradient-to-r', 'from-[#b6a0ff]', 'to-[#7e51ff]', 'text-white');
            document.getElementById('loginTab').classList.add('text-[#aaabaf]');
        }

        // Pokaż wiadomość
        function showMessage(text, isError = false) {
            const msg = document.getElementById('message');
            const msgText = document.getElementById('messageText');
            msg.classList.remove('hidden');
            msgText.textContent = text;
            msgText.className = isError ? 'text-sm text-red-400' : 'text-sm text-green-400';
        }

        // Logowanie
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showMessage('Błąd: ' + error.message, true);
            } else {
                showMessage('Zalogowano! Przekierowuję...');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        });

        // Rejestracja
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username
                    }
                }
            });

            if (error) {
                showMessage('Błąd: ' + error.message, true);
            } else {
                showMessage('Konto utworzone! Możesz się teraz zalogować.');
                setTimeout(() => {
                    showLogin();
                }, 2000);
            }
        });
    </script>
</body>
</html>
